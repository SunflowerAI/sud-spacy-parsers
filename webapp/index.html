<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SUD parser tester</title>
<script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>
<style>
  :root {
    --bg: #fbfaf7;
    --ink: #1c1b19;
    --muted: #6b6862;
    --line: #d8d4cc;
    --accent: #b4532a;       /* comp  — complement (warm terracotta) */
    --accent2: #2f6f6a;      /* mod   — modifier (cool teal) */
    --subj: #9a7b18;         /* subj  — subject (warm gold, distinct from comp) */
    --udep: #9a7b18;         /* udep  — undisambiguated */
    --card: #ffffff;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font: 15px/1.5 -apple-system, "Helvetica Neue", Arial, sans-serif;
    color: var(--ink);
    background: var(--bg);
  }
  header {
    padding: 22px 28px 16px;
    border-bottom: 1px solid var(--line);
  }
  h1 { margin: 0; font-size: 19px; font-weight: 650; letter-spacing: -0.01em; }
  header p { margin: 4px 0 0; color: var(--muted); font-size: 13px; }
  main { padding: 22px 28px; max-width: 1180px; margin: 0 auto; }

  .controls {
    display: flex;
    flex-wrap: wrap;
    gap: 14px 20px;
    align-items: flex-end;
    margin-bottom: 16px;
  }
  .field { display: flex; flex-direction: column; gap: 5px; }
  .field label { font-size: 12px; color: var(--muted); font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em; }
  select, textarea, button {
    font: inherit;
    color: var(--ink);
    border: 1px solid var(--line);
    border-radius: 8px;
    background: var(--card);
    padding: 8px 10px;
  }
  select { min-width: 150px; }
  textarea {
    width: 100%;
    min-height: 70px;
    resize: vertical;
    line-height: 1.45;
  }
  .seg {
    display: inline-flex;
    border: 1px solid var(--line);
    border-radius: 8px;
    overflow: hidden;
  }
  .seg button {
    border: none;
    border-radius: 0;
    background: var(--card);
    padding: 8px 14px;
    cursor: pointer;
    color: var(--muted);
  }
  .seg button + button { border-left: 1px solid var(--line); }
  .seg button.on { background: var(--ink); color: #fff; }
  .parse-btn {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
    cursor: pointer;
    font-weight: 600;
    padding: 9px 20px;
  }
  .parse-btn:disabled { opacity: .55; cursor: default; }

  .legend { display: flex; gap: 18px; flex-wrap: wrap; margin: 6px 0 18px; font-size: 12.5px; color: var(--muted); }
  .legend span { display: inline-flex; align-items: center; gap: 6px; }
  .swatch { width: 22px; height: 3px; border-radius: 2px; display: inline-block; }

  #out { display: flex; flex-direction: column; gap: 18px; }
  .sent-card {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 8px 6px 4px;
    overflow-x: auto;
  }
  .hint { color: var(--muted); font-size: 13px; }
  .err { color: var(--accent); font-size: 14px; }

  svg text { font-family: inherit; }
  .tok-word { font-size: 15px; fill: var(--ink); }
  .tok-pos  { font-size: 11px; fill: var(--muted); letter-spacing: .02em; }
  .arc-path { fill: none; stroke-width: 1.6; }
</style>
</head>
<body>
<header>
  <h1>SUD dependency parser tester</h1>
  <p>spaCy parsers trained on Surface-Syntactic Universal Dependencies. The <em>relabeled</em>
     model disambiguates each <code>udep</code> adposition into <code>comp:obl</code> or <code>mod</code>.</p>
</header>

<main>
  <div class="controls">
    <div class="field">
      <label for="lang">Language</label>
      <select id="lang"></select>
    </div>
    <div class="field">
      <label>Model</label>
      <div class="seg" id="model"></div>
    </div>
    <div class="field" style="flex:1; min-width:320px;">
      <label for="text">Text</label>
      <textarea id="text" placeholder="Type a sentence…"></textarea>
    </div>
    <button class="parse-btn" id="go">Parse</button>
  </div>

  <div class="legend">
    <span><i class="swatch" style="background:var(--subj)"></i> subj (subject)</span>
    <span><i class="swatch" style="background:var(--accent)"></i> comp (complement)</span>
    <span><i class="swatch" style="background:var(--accent2)"></i> mod (modifier)</span>
    <span><i class="swatch" style="background:#9a958c"></i> other</span>
  </div>

  <div id="out"><p class="hint">Pick a language and press Parse.</p></div>
</main>

<script>
function getCSS(v){ return getComputedStyle(document.documentElement).getPropertyValue(v).trim(); }
// Arcs are colour-coded by relation category. subj and comp are both warm
// (gold vs terracotta) but clearly distinct; mod is cool; everything else grey.
const CAT_COLOR = {
  subj:  getCSS("--subj"),     // warm gold
  comp:  getCSS("--accent"),   // warm terracotta
  mod:   getCSS("--accent2"),  // cool teal
  other: "#9a958c",            // grey
};
function depCat(dep){
  const base = (dep || "").split(/[:@]/)[0];   // strip :subtype and @subtype
  return (base === "subj" || base === "comp" || base === "mod") ? base : "other";
}
function depColor(dep){ return CAT_COLOR[depCat(dep)]; }

const $lang = document.getElementById("lang");
const $model = document.getElementById("model");
const $text = document.getElementById("text");
const $go = document.getElementById("go");
const $out = document.getElementById("out");

let MODELS = {};

init();

async function init(){
  try {
    MODELS = await (await fetch("/api/models")).json();
  } catch(e){
    $out.innerHTML = `<p class="err">Could not reach the server. Is server.py running?</p>`;
    return;
  }
  const langs = Object.keys(MODELS);
  if(!langs.length){ $out.innerHTML = `<p class="err">No model wheels installed. See the README.</p>`; return; }
  $lang.innerHTML = langs.map(l => `<option value="${l}">${MODELS[l].name}</option>`).join("");
  $lang.onchange = onLang;
  $go.onclick = parse;
  $text.addEventListener("keydown", e => {
    if((e.metaKey||e.ctrlKey) && e.key === "Enter") parse();
  });
  onLang();
}

function onLang(){
  const m = MODELS[$lang.value];
  $model.textContent = m.package;     // one shipped model per language
  $text.value = m.example || "";
  $text.dir = m.rtl ? "rtl" : "ltr";
  parse();
}

async function parse(){
  const text = $text.value.trim();
  if(!text){ $out.innerHTML = `<p class="hint">Enter some text.</p>`; return; }
  $go.disabled = true; $go.textContent = "Parsing…";
  try {
    const res = await fetch("/api/parse", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({lang: $lang.value, text}),
    });
    const data = await res.json();
    if(!res.ok){ throw new Error(data.error || res.statusText); }
    render(data.sentences, MODELS[$lang.value] && MODELS[$lang.value].rtl);
  } catch(e){
    $out.innerHTML = `<p class="err">Error: ${e.message}</p>`;
  } finally {
    $go.disabled = false; $go.textContent = "Parse";
  }
}

function render(sentences, rtl){
  $out.innerHTML = "";
  if(!sentences.length){ $out.innerHTML = `<p class="hint">No sentences.</p>`; return; }
  sentences.forEach(toks => {
    const card = document.createElement("div");
    card.className = "sent-card";
    card.appendChild(renderSentence(toks, rtl));
    $out.appendChild(card);
  });
}

// ---- displaCy-style arc rendering in D3 -------------------------------------
function renderSentence(toks, rtl){
  const PAD_X = 28;                      // canvas side padding
  const ROW = 38;                       // vertical room per arc level
  const NODE_R = 8;                      // invisible circle: arc ends stop this far short of a node
  const WORD_Y_OFFSET = 26 - 2 * NODE_R; // word baseline, pulled a diameter up so it tucks under the arc ends
  const measure    = makeMeasurer("15px -apple-system, Helvetica Neue, Arial, sans-serif");
  const measurePos = makeMeasurer("11px -apple-system, Helvetica Neue, Arial, sans-serif");
  const SPACE = measure(" ");            // a single word space
  const isPunct = t => t.dep === "punct";

  // token x-centres: each node sized to its content, nodes separated by a single
  // word space so the row reads like the sentence rather than an even grid.
  // Punctuation abuts the preceding token (no leading space).
  let x = PAD_X, centres = [], widths = [];
  toks.forEach((t, i) => {
    if (i > 0 && !isPunct(t)) x += SPACE;
    const w = Math.max(measure(t.text), measurePos(t.pos));
    widths.push(w);
    centres.push(x + w/2);
    x += w;
  });
  const totalW = x + PAD_X;
  // RTL scripts (Persian, Arabic): mirror the layout so token 0 sits on the right
  // (arc geometry is symmetric in x, so mirroring centres keeps every arc correct)
  if (rtl) centres = centres.map(c => totalW - c);

  // arcs (skip the root self-loop); assign non-overlapping levels (interval colouring)
  const arcs = toks
    .filter(t => t.head !== t.id && !isPunct(t))   // skip the root self-loop and punctuation arcs
    .map(t => ({
      from: t.head, to: t.id, dep: t.dep,
      lo: Math.min(t.head, t.id), hi: Math.max(t.head, t.id),
    }))
    .sort((a,b) => (a.hi-a.lo) - (b.hi-b.lo));   // shortest first -> nested inside

  const levelEnds = [];   // levelEnds[k] = rightmost hi occupied at level k
  arcs.forEach(a => {
    let k = 0;
    // ">" not ">=": arcs that only touch at a shared endpoint token don't collide,
    // so they may share a level (keeps adjacent span-1 arcs at the same height)
    while(k < levelEnds.length && levelEnds[k] > a.lo) k++;
    a.level = k;
    levelEnds[k] = a.hi;
  });
  const maxLevel = Math.max(0, ...arcs.map(a => a.level)) + 1;

  const arcZone = maxLevel * ROW + 10;
  const wordY = arcZone + WORD_Y_OFFSET;
  const height = wordY + 26;

  const svg = d3.create("svg")
    .attr("width", totalW)
    .attr("height", height)
    .attr("viewBox", `0 0 ${totalW} ${height}`);

  // arrowhead markers, one per colour
  const defs = svg.append("defs");
  const colours = new Set(arcs.map(a => depColor(a.dep)));
  colours.forEach(c => {
    defs.append("marker")
      .attr("id", "ah-" + c.replace(/[^a-z0-9]/gi,""))
      .attr("viewBox","0 0 8 8").attr("refX",4).attr("refY",4)
      // userSpaceOnUse: arrowhead size is fixed, independent of stroke width, so the
      // bold (highlighted) arcs get the same-size head as the thin ones (8 = 5 * 1.6)
      .attr("markerUnits","userSpaceOnUse")
      .attr("markerWidth",8).attr("markerHeight",8).attr("orient","auto-start-reverse")
      .append("path").attr("d","M0,0 L8,4 L0,8 Z").attr("fill",c);
  });

  // arcs — same layout as the plain displaCy bumps, but each end "stops short" at the edge of
  // an invisible circle (radius NODE_R) around the node point at `arcZone`, so the links to/from
  // a token don't all touch one point. We keep the original cubic and trim the sub-curve outside
  // the circles. The ROOT start has no circle.
  const rootId = toks.findIndex(t => t.head === t.id);
  arcs.forEach(a => {
    const x1 = centres[a.from], x2 = centres[a.to];
    let top = arcZone - (a.level + 1) * ROW + ROW - 6;   // higher level -> higher up
    // lift adjacent (span-1) arcs: a ~6px-tall level-0 bump hooks straight down
    // into the arrowhead (hairpin); give the short curve room to round into it
    if (a.hi - a.lo === 1) top = Math.min(top, arcZone - 20);
    // arc cubic: head node point -> over `top` -> dependent node point
    const P = [[x1, arcZone], [x1, top], [x2, top], [x2, arcZone]];
    let t0 = a.from === rootId ? 0 : trimT(P, 0, NODE_R);   // start side (head)
    let t1 = trimT(P, 1, NODE_R);                            // end side (dependent, arrowhead)
    if (t1 <= t0) { t0 = 0; t1 = 1; }                        // arc too short to trim
    const s = subCurve(P, t0, t1);
    const c = depColor(a.dep);
    const path = `M ${s[0][0]} ${s[0][1]} C ${s[1][0]} ${s[1][1]}, ${s[2][0]} ${s[2][1]}, ${s[3][0]} ${s[3][1]}`;
    svg.append("path")
      .attr("d", path)
      .attr("class", "arc-path")
      .attr("stroke", c)
      .attr("marker-end", `url(#ah-${c.replace(/[^a-z0-9]/gi,"")})`);
    // no text label — the relation category is conveyed by colour (see legend)
  });

  // words + POS
  toks.forEach((t, i) => {
    const cx = centres[i];
    svg.append("text").attr("class","tok-word")
      .attr("x", cx).attr("y", wordY).attr("text-anchor","middle").text(t.text);
    svg.append("text").attr("class","tok-pos")
      .attr("x", cx).attr("y", wordY+16).attr("text-anchor","middle").text(t.pos);
  });

  return svg.node();
}

// text width helper via an offscreen canvas
function makeMeasurer(font){
  const c = document.createElement("canvas").getContext("2d");
  c.font = font;
  return s => c.measureText(s || "").width;
}

// ---- cubic Bézier trimming (so arc ends stop short at the node's circle) ----------
function bezPt(P, t){
  const u = 1 - t, a = u*u*u, b = 3*u*u*t, c = 3*u*t*t, d = t*t*t;
  return [a*P[0][0] + b*P[1][0] + c*P[2][0] + d*P[3][0],
          a*P[0][1] + b*P[1][1] + c*P[2][1] + d*P[3][1]];
}
function lerp(A, B, t){ return [A[0] + (B[0]-A[0])*t, A[1] + (B[1]-A[1])*t]; }
function splitAt(P, t){                       // De Casteljau: split a cubic at t
  const A = lerp(P[0],P[1],t), B = lerp(P[1],P[2],t), C = lerp(P[2],P[3],t);
  const D = lerp(A,B,t), E = lerp(B,C,t), F = lerp(D,E,t);
  return { left: [P[0],A,D,F], right: [F,E,C,P[3]] };
}
function subCurve(P, t0, t1){                  // the sub-cubic over [t0, t1]
  if (t0 <= 0 && t1 >= 1) return P;
  const r = splitAt(P, t0).right;              // [t0, 1]
  const tt = t1 >= 1 ? 1 : (t1 - t0) / (1 - t0);
  return splitAt(r, tt).left;                  // [t0, t1]
}
// the parameter where the curve first leaves a circle of radius R around an endpoint
// (end 0 = walk forward from the start; end 1 = walk back from the end)
function trimT(P, end, R){
  const anchor = end === 0 ? P[0] : P[3], STEP = 0.004;
  if (end === 0){
    for (let t = 0; t <= 1; t += STEP){ const q = bezPt(P,t);
      if (Math.hypot(q[0]-anchor[0], q[1]-anchor[1]) >= R) return t; }
    return 1;
  }
  for (let t = 1; t >= 0; t -= STEP){ const q = bezPt(P,t);
    if (Math.hypot(q[0]-anchor[0], q[1]-anchor[1]) >= R) return t; }
  return 0;
}
</script>
</body>
</html>
