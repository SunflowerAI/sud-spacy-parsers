[paths]
train = null
dev = null
vectors = null
init_tok2vec = null

[system]
gpu_allocator = null
seed = 0

[nlp]
lang = "ar"
pipeline = ["tok2vec", "tagger", "parser", "morphologizer"]
batch_size = 1000
disabled = []
before_creation = null
after_creation = null
after_pipeline_creation = null

[corpora]

[training]
dev_corpus = "corpora.dev"
train_corpus = "corpora.train"
seed = ${system.seed}
gpu_allocator = ${system.gpu_allocator}
dropout = 0.1
accumulate_gradient = 1
patience = 1600
max_epochs = 0
max_steps = 20000
eval_frequency = 200
frozen_components = ["tok2vec", "tagger", "parser"]
annotating_components = []
before_to_disk = null
before_update = null

[initialize]
vectors = ${paths.vectors}
init_tok2vec = ${paths.init_tok2vec}
vocab_data = null
lookups = null
before_init = null
after_init = null

[components]

[pretraining]

[nlp.tokenizer]
@tokenizers = "ar.CamelAtbTokenizer.v1"

[nlp.vectors]
@vectors = "spacy.Vectors.v1"

[corpora.train]
@readers = "sud.GoldTokCorpus.v1"
path = ${paths.train}
max_length = 0
limit = 0
augmenter = null

[corpora.dev]
@readers = "sud.GoldTokCorpus.v1"
path = ${paths.dev}
max_length = 0
limit = 0
augmenter = null

[training.optimizer]
@optimizers = "Adam.v1"
beta1 = 0.9
beta2 = 0.999
L2_is_weight_decay = true
L2 = 0.01
grad_clip = 1.0
use_averages = false
eps = 1e-08
learn_rate = 0.001

[training.batcher]
@batchers = "spacy.batch_by_words.v1"
discard_oversize = false
tolerance = 0.2
get_length = null

[training.logger]
@loggers = "spacy.ConsoleLogger.v1"
progress_bar = false

[training.score_weights]
tag_acc = 0.0
pos_acc = 0.8
tag_micro_p = 0.0
tag_micro_r = 0.0
tag_micro_f = 0.0
dep_uas = 0.0
dep_las = 0.0
dep_las_per_type = null
sents_p = 0.0
sents_r = 0.0
sents_f = 0.0
morph_acc = 0.2

[initialize.tokenizer]

[initialize.components]

[components.tok2vec]
source = "training_ar_seg/model-best"

[components.tagger]
source = "training_ar_seg/model-best"

[components.parser]
source = "training_ar_seg/model-best"

[components.morphologizer]
factory = "morphologizer"
label_smoothing = 0.0
overwrite = true
extend = false

[training.batcher.size]
@schedules = "compounding.v1"
start = 100
stop = 1000
compound = 1.001
t = 0.0

[components.morphologizer.scorer]
@scorers = "spacy.morphologizer_scorer.v1"

[components.morphologizer.model]
@architectures = "spacy.Tagger.v2"
nO = null
normalize = false

[components.morphologizer.model.tok2vec]
@architectures = "spacy.HashEmbedCNN.v2"
pretrained_vectors = null
width = 64
depth = 3
embed_size = 2000
window_size = 1
maxout_pieces = 3
subword_features = true